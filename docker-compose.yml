version: '3.8'

services:
  # AI SOC Dashboard Service
  soc-dashboard:
    build: .
    container_name: ai_soc_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      - ollama
    restart: always

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: always

volumes:
  ollama_storage:
